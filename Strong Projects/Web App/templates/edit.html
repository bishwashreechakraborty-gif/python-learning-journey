{% extends "base.html" %}
{% block title %}Edit Expense{% endblock %}

{% block content %}
<h1 class="page-title">✏️ Edit Expense</h1>

<div class="form-panel">
    <form method="POST" action="{{ url_for('edit_expense', expense_id=expense.id) }}">

        <div class="form-group">
            <label for="title">Title <span class="required">*</span></label>
            <input type="text" id="title" name="title"
                   value="{{ expense.title }}" required maxlength="100">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="amount">Amount (₹) <span class="required">*</span></label>
                <input type="number" id="amount" name="amount" step="0.01"
                       value="{{ expense.amount }}" required>
            </div>
            <div class="form-group">
                <label for="date">Date <span class="required">*</span></label>
                <input type="date" id="date" name="date"
                       value="{{ expense.date }}" required>
            </div>
        </div>

        <div class="form-group">
            <label for="category">Category <span class="required">*</span></label>
            <select id="category" name="category" required>
                {% for cat in categories %}
                <option value="{{ cat }}" {% if expense.category == cat %}selected{% endif %}>
                    {{ cat }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="note">Note</label>
            <textarea id="note" name="note" rows="3">{{ expense.note }}</textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">💾 Update</button>
            <a href="{{ url_for('list_expenses') }}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
