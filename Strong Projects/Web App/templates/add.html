{% extends "base.html" %}
{% block title %}Add Expense{% endblock %}

{% block content %}
<h1 class="page-title">➕ Add New Expense</h1>

<div class="form-panel">
    <form method="POST" action="{{ url_for('add_expense') }}">

        <div class="form-group">
            <label for="title">Title <span class="required">*</span></label>
            <input type="text" id="title" name="title" placeholder="e.g. Grocery Shopping"
                   required maxlength="100">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="amount">Amount (₹) <span class="required">*</span></label>
                <input type="number" id="amount" name="amount" step="0.01"
                       min="0.01" placeholder="0.00" required>
            </div>

            <div class="form-group">
                <label for="date">Date <span class="required">*</span></label>
                <input type="date" id="date" name="date" value="{{ today }}" required>
            </div>
        </div>

        <div class="form-group">
            <label for="category">Category <span class="required">*</span></label>
            <select id="category" name="category" required>
                <option value="">— Select Category —</option>
                {% for cat in categories %}
                <option value="{{ cat }}">{{ cat }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="note">Note (optional)</label>
            <textarea id="note" name="note" rows="3"
                      placeholder="Any extra details..."></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">💾 Save Expense</button>
            <a href="{{ url_for('index') }}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
